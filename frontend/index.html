<!DOCTYPE html>
<html>
<head>
  <title>Strapi v5 Dynamic Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; }
    nav { background: #333; padding: 12px; }
    nav a { color: white; margin-right: 15px; font-weight: bold; text-decoration: none; cursor: pointer; }
    nav a.active-link { text-decoration: underline; }
    .page { display: none; padding: 20px 0; }
    .active { display: block; }
    .item, .article { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
    img { max-width: 100%; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a data-page="home" class="active-link">Home</a>
    <a data-page="who">Who We Are</a>
    <a data-page="whitepaper">Whitepaper</a>
    <a data-page="insight">Insight</a>
    <a data-page="services">Services</a>
  </nav>

  <!-- Pages -->
  <div id="home" class="page active">
    <h1>Articles</h1>
    <div id="articles">Loading...</div>
  </div>

  <div id="who" class="page">
    <h1>Who We Are</h1>
    <div id="who-content">Loading...</div>
  </div>

  <div id="whitepaper" class="page">
    <h1>Whitepaper</h1>
    <div id="whitepaper-content">Loading...</div>
  </div>

  <div id="insight" class="page">
    <h1>Insight</h1>
    <div id="insight-content">Loading...</div>
  </div>

  <div id="services" class="page">
    <h1>Services</h1>
    <div id="services-content">Loading...</div>
  </div>

  <script>
    const BASE_URL = "http://localhost:1337";

    // Create image element
    function createImage(url, alt="") {
      const img = document.createElement("img");
      img.src = url;
      img.alt = alt;
      return img;
    }

    /* --------------------------
       NAVIGATION
    --------------------------- */
    document.querySelectorAll("nav a").forEach(link => {
      link.addEventListener("click", () => {
        const page = link.dataset.page;

        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(page).classList.add("active");

        document.querySelectorAll("nav a").forEach(a => a.classList.remove("active-link"));
        link.classList.add("active-link");
      });
    });

    /* --------------------------
       LOAD COLLECTION (Articles)
    --------------------------- */
    async function loadCollection(endpoint, containerId) {
      const container = document.getElementById(containerId);

      try {
        const res = await fetch(`${BASE_URL}/api/${endpoint}?populate=*`);
        const json = await res.json();
        const items = json.data || [];

        container.innerHTML = "";

        if(!items.length){
          container.innerHTML = "No content found";
          return;
        }

        items.forEach(item => {
          const attrs = item.attributes || item;

          const div = document.createElement("div");
          div.className = "article";

          div.innerHTML = `
            <h2>${attrs.title || ""}</h2>
            <p>${attrs.description || ""}</p>
          `;

          if(attrs.cover?.url){
            div.appendChild(createImage(BASE_URL + attrs.cover.url, attrs.title));
          }

          container.appendChild(div);
        });

      } catch(err) {
        console.error(err);
        container.innerHTML = "Failed to load articles";
      }
    }

    /* --------------------------
       LOAD SINGLE TYPE
    --------------------------- */
    async function loadSingle(endpoint, containerId, config = {}) {
      const container = document.getElementById(containerId);

      try {
        const res = await fetch(`${BASE_URL}/api/${endpoint}?populate=*`);
        const json = await res.json();

        const data = json.data;
        const attrs = data?.attributes || data;

        container.innerHTML = "";

        if(!attrs){
          container.innerHTML = "No content found";
          return;
        }

        const div = document.createElement("div");
        div.className = "item";

        // Text fields (safe default to empty array)
        const textFields = Array.isArray(config.text) ? config.text : [];
        textFields.forEach(field => {
          if(attrs[field]){
            const p = document.createElement("p");
            p.textContent = attrs[field];
            div.appendChild(p);
          }
        });

        // Image fields (safe default to empty array)
        const imageFields = Array.isArray(config.images) ? config.images : [];
        imageFields.forEach(field => {
          const imgData = attrs[field];
          if(!imgData) return;

          const imageUrl =
            imgData?.formats?.small?.url ||
            imgData?.formats?.thumbnail?.url ||
            imgData?.url;

          if(imageUrl){
            div.appendChild(createImage(BASE_URL + imageUrl, field));
          }
        });

        container.appendChild(div);

      } catch(err) {
        console.error(err);
        container.innerHTML = "Failed to load content";
      }
    }

    /* --------------------------
       INITIAL LOAD
    --------------------------- */

    // Articles
    loadCollection("articles", "articles");

    // Who We Are
    loadSingle("who-we-are","who-content",{
      text:["LABs","ITService","eangadi"],
      images:["Images","Image","Banner"]
    });

    // Whitepaper
    loadSingle("whitepaper","whitepaper-content",{
      text:["whitework"],
      images:["photo"]
    });

    // Insight
    loadSingle("insight","insight-content",{
      text:["Insight"],
      images:["uploads"]
    });

    // Services
    loadSingle("services","services-content",{
      text:["title","description"],
      images:["image"]
    });

  </script>

</body>
</html>
