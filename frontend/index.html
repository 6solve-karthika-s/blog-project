<!DOCTYPE html>
<html>
<head>
  <title>Strapi v5 Dynamic Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; }
    nav { background: #333; padding: 12px; }
    nav a { color: white; margin-right: 15px; font-weight: bold; text-decoration: none; cursor: pointer; }
    nav a.active-link { text-decoration: underline; }
    .page { display: none; padding: 20px 0; }
    .active { display: block; }
    .item, .article { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
    img { max-width: 100%; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>

<nav>
  <a id="nav-home">Home</a>
  <a id="nav-who">Who We Are</a>
  <a id="nav-whitepaper">Whitepaper</a>
  <a id="nav-insight">Insight</a>
</nav>

<!-- Pages -->
<div id="home" class="page active">
  <h1>Articles</h1>
  <div id="articles">Loading...</div>
</div>

<div id="who" class="page">
  <h1>Who We Are</h1>
  <div id="who-content">Loading...</div>
</div>

<div id="whitepaper" class="page">
  <h1>Whitepaper</h1>
  <div id="whitepaper-content">Loading...</div>
</div>

<div id="insight" class="page">
  <h1>Insight</h1>
  <div id="insight-content">Loading...</div>
</div>

<script>
const BASE_URL = "http://localhost:1337";

// --- Navigation ---
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  document.querySelectorAll("nav a").forEach(a => a.classList.remove("active-link"));
  document.getElementById("nav-" + page).classList.add("active-link");
}

document.getElementById("nav-home").addEventListener("click", () => showPage("home"));
document.getElementById("nav-who").addEventListener("click", () => showPage("who"));
document.getElementById("nav-whitepaper").addEventListener("click", () => showPage("whitepaper"));
document.getElementById("nav-insight").addEventListener("click", () => showPage("insight"));

// --- Utility to create image ---
function createImage(url, alt="") {
  const img = document.createElement("img");
  img.src = url;
  img.alt = alt;
  return img;
}

// --- Load Collection Type (Articles) ---
async function loadCollection(endpoint, containerId, mediaField, textField) {
  const container = document.getElementById(containerId);

  try {
    const res = await fetch(`${BASE_URL}/api/${endpoint}?populate=${mediaField}`);
    const json = await res.json();

    let items = [];

    if (Array.isArray(json.data)) {
      items = json.data;
    } else if (json.data) {
      items = [json.data];
    }

    container.innerHTML = "";

    if (!items.length) {
      container.innerHTML = "No content found";
      return;
    }

    items.forEach(item => {
      const attrs = item;

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <h2>${attrs.title || attrs.LABs || "No title"}</h2>
        <h2>${ attrs.ITService|| ""}</h2>

        <p>${attrs[textField] || ""}</p>
      `;

      const imgData = attrs[mediaField];

      if (imgData?.url) {
        div.appendChild(
          createImage(BASE_URL + imgData.url, attrs.title || "")
        );
      }
       container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load content";
  }
}

async function loadSingle(endpoint, containerId, mediaFields = [], textFields = []) {
  const container = document.getElementById(containerId);

  try {
    const res = await fetch(`${BASE_URL}/api/${endpoint}?populate=*`);
    const json = await res.json();

    const data = json.data;

    container.innerHTML = "";

    if (!data) {
      container.innerHTML = "No content found";
      return;
    }

    const attrs = data;

    const div = document.createElement("div");
    div.className = "item";

    // Multiple text sections
    textFields.forEach(field => {
      if (attrs[field]) {
        const section = document.createElement("div");
        section.className = field;

        section.innerHTML = `<p>${attrs[field]}</p>`;

        div.appendChild(section);
      }
    });

    // Images
    mediaFields.forEach(mediaField => {
      const imgData = attrs[mediaField];
      if (!imgData) return;

      const imageUrl =
        imgData.formats?.small?.url ||
        imgData.formats?.thumbnail?.url ||
        imgData.url;

      if (imageUrl) {
        const img = document.createElement("img");
        img.src = BASE_URL + imageUrl;
        img.alt = mediaField;

        div.appendChild(img);
      }
    });

    container.appendChild(div);

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load content";
  }
}
// --- Initial Load ---
loadCollection("articles", "articles", "cover", "description");
loadSingle("who-we-are", "who-content", "Images","Banner", "description");
loadSingle("whitepaper", "whitepaper-content", "photo", "whitework");
loadSingle("insight", "insight-content", "uploads", "Insight");
